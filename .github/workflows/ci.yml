name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -q
      - name: Mock harness smoke run
        run: |
          codegen-eval run --mock --tasks fizzbuzz safe_calc list_files has_duplicates --out results.json
          codegen-eval report results.json
